- name: load credentials
  run_once: true
  ansible.builtin.include_vars:
    file: "../inventories/{{ site.segment }}/identity/group_vars/all/vault.yml"
  no_log: true

- name: create secret for postgres superuser password
  loop: "{{ observer_instances }}"
  loop_control:
    label: "Creating secret in {{item.namespace}}"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: observer-postgres-superuser
        namespace: "{{ item.namespace }}"
      stringData:
        superuser_pass: "{{ observer.postgres.superuser | selectattr('namespace', 'equalto', item.namespace) | map(attribute='password') | first }}"

- name: create secret for image pulls from local gitlab
  loop: "{{ observer_instances }}"
  loop_control:
    label: "Creating secret in {{item.namespace}}"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ops-indef-container-reg
        namespace: "{{ item.namespace }}"
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: >-
          {{
            {
              'auths': {
                observer.image_pull.registry: {
                  'username': observer.image_pull.username,
                  'password': observer.image_pull.token,
                  'auth': (observer.image_pull.username + ':' + observer.image_pull.token) | b64encode
                }
              }
            } | to_json
          }}

