    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: observer-flask-key
        namespace: "{{ item.namespace }}"
      stringData:
        secret_key: "{{ observer.flask | selectattr('namespace','equalto',item.namespace) | map(attribute='value') | first }}"
