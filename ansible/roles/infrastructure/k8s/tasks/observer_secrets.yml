- name: create secret for web app token
  loop: "{{ observer_instances }}"
  loop_control:
    label: "Creating secret in {{ item.namespace }}"
  vars:
    token: "{{ 'insecure-dev-api-token-do-not-use-in-prod' if '-dev' in item.namespace else lookup('ansible.builtin.password','/dev/null',length=64,chars='hexdigits') }}"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: observer-api-web-creds
        namespace: "{{ item.namespace }}"
      stringData:
        token: "{{ token }}"
        token_hash: "{{ token | hash('sha256') }}"

- name: create secret for flask
  loop: "{{ observer_instances }}"
  loop_control:
