# Deploys secrets for the Observer application
- name: create secret for root cert
  loop: "{{ observer_instances }}"
  loop_control:
    label: "Creating secret in {{item.namespace}}"
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: observer-root-cert
        namespace: "{{ item.namespace }}"
      stringData:
        root.crt: "{{ lookup('file',role_path ~ '/files/' ~ item.namespace ~ '/observer_root.crt')}}"

