# Installs and Configures ArgoCD

- name: create argocd namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    name: 'argocd'
    api_version: v1
    kind: Namespace
    state: present

- name: deploy argocd
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    src: 'https://raw.githubusercontent.com/argoproj/argo-cd/v{{ versions.argocd }}/manifests/ha/install.yaml'
    namespace: argocd
    apply: true
    server_side_apply:
      field_manager: ansible
      force_conflicts: true

- name: wait for argocd-server to finish deploying
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: v1
    kind: Deployment
    namespace: argocd
    name: argocd-server
  register: deploy_status
  until: deploy_status.resources[0].status.readyReplicas == deploy_status.resources[0].status.replicas
  retries: 20
  delay: 5

- name: wait for argocd-repo-server to finish deploying
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: v1
    kind: Deployment
    namespace: argocd
    name: argocd-repo-server
  register: deploy_status
  until: deploy_status.resources[0].status.readyReplicas == deploy_status.resources[0].status.replicas
  retries: 20
  delay: 5

