- name: setup log files
  become: true
  loop: "{{ monitored_paths | selectattr('path','search','/var/log/caddy') }}"
  loop_control:
    label: "Touching {{ item.path }}"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: caddy
    group: caddy
    mode: 0644
    state: touch
  changed_when: false

- name: setup cert directories
  become: true
  ansible.builtin.file:
    state: directory
    path: "{{ node_a_path if cert_type == 'active' else node_b_path }}"
    owner: caddy
    group: caddy
    mode: '0770'

## TODO - replace with enterprise Root CA once available
- name: copy root CA
  become: true
  ansible.builtin.copy:
    src: "{{ gateway_root}}/gateway.crt"
    dest: /var/lib/caddy/internal-ca.pem
    owner: caddy
    group: caddy
    mode: '0644'
  register: ca

- name: render caddy configuration
  become: true
  ansible.builtin.template:
    src: templates/caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0750'
    owner: caddy
    group: caddy
  register: config

- name: reload caddy
  become: true
  when: config.changed or ca.changed
  ansible.builtin.systemd_service:
    name: caddy
    state: reloaded
    enabled: true