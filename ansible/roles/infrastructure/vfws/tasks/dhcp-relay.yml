# Configure the DHCP Relay using dnsmasq
- name: render configuration template
  become: true
  ansible.builtin.template:
    src: templates/dhcp_relay.j2
    dest: /etc/dnsmasq.d/dhcp-relay.conf
    owner: root
    group: dnsmasq
    mode: '0644'
  register: config_results

- name: create systemd directory for dnsmasq overrides
  become: true
  ansible.builtin.file:
    state: directory
    path: /etc/systemd/system/dnsmasq.service.d/

- name: enforce dnsmasq configuration via systemd overwrite
  become: true
  ansible.builtin.template:
    src: templates/dnsmasq_override.j2
    dest: /etc/systemd/system/dnsmasq.service.d/override.conf
    owner: root
    group: root
    mode: 0644
  register: override_results

- name: reload systemd cache
#  when: override_results.changed
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: restart dnsmasq
#  when: config_results.changed
  become: true
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: restarted

- name: enable dnsmasq service
  become: true
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: started
    enabled: true
