- name: apply subsystem rules
  become: true
  loop: "{{ lookup('ansible.builtin.fileglob',role_path + '/templates/nft_subsystems/*',wantlist=True) }}"
  loop_control:
    label: "{{ ((item | split('_'))[-1] | split('.'))[0] }}"
  ansible.builtin.template:
    src: templates/nft_subsystems/nft_{{ ((item | split('_'))[-1] | split('.'))[0] }}.j2
    dest: /etc/nftables.d/10-{{ ((item | split('_'))[-1] | split('.'))[0] }}.nft
    owner: root
    group: root
    mode: '0600'
  notify:
  - check nftables config
  - nftables config check results
  - reload nftables
