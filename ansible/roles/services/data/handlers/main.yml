- name: restart splunkd
  kubernetes.core.k8s_exec:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ components.analysis.data.namespace }}"
    pod: "{{ splunk_pod }}"
    command: /opt/splunk/bin/splunk restart

- name: reload vector
  ansible.builtin.systemd_service:
    name: vector
    state: reloaded