# Renders the indexes.conf.j2 template and copies it into the pod
- name: get pod name for splunk standalone
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    kind: Pod
    namespace: "{{ components.analysis.data.namespace }}"
  register: pod_list

- name: validate only one running pod
  ansible.builtin.assert:
    that:
    - pod_list.resources | length == 1

- name: extract pod name
  ansible.builtin.set_fact:
    splunk_pod: "{{pod_list.resources[0].metadata.name }}"

- debug:
    var: splunk_pod

- meta: end_play

- name: render indexes configuration
  kubernetes.core.k8s_cp:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ components.analysis.data.namespace }}"
    pod: "{{ splunk_pod }}"
    content: "{{ lookup('template','indexes.conf.j2') }}"
    remote_path: /opt/splunk/etc/system/local/inputs.conf
