# Renders the indexes.conf.j2 template and copies it into the pod
- name: get pod name for splunk standalone
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    kind: Pod
    namespace: "{{ components.analysis.data.namespace }}"
  register: pod_list

- name: validate only one running pod
  ansible.builtin.assert:
    that:
    - pod_list.resources | length == 1

- name: extract pod name
  ansible.builtin.set_fact:
    splunk_pod: "{{pod_list.resources[0].metadata.name }}"

- name: capture current config for idempotency check
  kubernetes.core.k8s_exec:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ components.analysis.data.namespace }}"
    pod: "{{ splunk_pod }}"
    command: cat /opt/splunk/etc/system/local/indexes.conf
  register: old_config
  failed_when: false

- name: render new config
  ansible.builtin.set_fact:
    rendered_config: "{{ lookup('template','indexes.conf.j2') }}"

- name: compare old and new config
  ansible.builtin.set_fact:
    config_changed: "{{ old_config.rc != 0 or old_config.stdout != rendered_config }}"

- name: render indexes configuration
  when: config_changed
  kubernetes.core.k8s_cp:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ components.analysis.data.namespace }}"
    pod: "{{ splunk_pod }}"
    content: "{{ rendered_config }}"
    remote_path: /opt/splunk/etc/system/local/indexes.conf
