# Applies the configuration for the Vector application

- name: load dns vars
  ansible.builtin.include_vars:
    file: '../inventories/{{ site.segment }}/identity/group_vars/all/dns.yml'

- name: load ewfw vars
  ansible.builtin.include_vars:
    file: '../inventories/{{ site.segment }}/core/group_vars/vfws.yml'

- name: load cred vars
  ansible.builtin.include_vars:
    file: '../inventories/{{ site.segment }}/identity/group_vars/all/vault.yml'
  run_once: true
  no_log: true

## TODO - refactor below tasks once enterprise CA is available; should pull from CA
## Generate key material for tls endpoint

- name: load mgmt pi vars
  ansible.builtin.include_vars:
    file: '../inventories/{{ site.segment }}/{{ site.name }}/group_vars/mgmt_pi.yml'

- name: generate private key
  delegate_to: localhost
  become: true
  community.crypto.openssl_privatekey:
    path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_key.pem' }}"
    owner: deployexec
    group: ansible
    mode: 0760

- name: generate CSR
  delegate_to: localhost
  become: true
  community.crypto.openssl_csr:
    path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_request.csr' }}"
    privatekey_path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_key.pem' }}"
    common_name: '{{ dns_spec.records | selectattr("value","equalto",ansible_host) | map(attribute="name") | first }}.ops.indef.space'
    subject_alt_name:
    - 'DNS:{{ dns_spec.records | selectattr("value","equalto",ansible_host) | map(attribute="name") | first }}.ops.indef.space'
    owner: deployexec
    group: ansible
    mode: 0764

- name: generate self signed cert
  delegate_to: localhost
  become: true
  community.crypto.x509_certificate:
    path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_cert.crt' }}"
    csr_path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_request.csr' }}"
    privatekey_path: "{{ collectors_root ~ '/' ~ ansible_host ~ '_key.pem' }}"
    provider: selfsigned
    owner: deployexec
    group: ansible
    mode: 0764

- name: unset mgmt pi interpreter
  ansible.builtin.set_fact:
    ansible_python_interpreter: auto

## TODO - refactor below tasks once enterprise CA is available; should pull from CA

- name: create cert directory
  become: true
  ansible.builtin.file:
    path: "{{ vector_tls_root }}"
    state: directory
    owner: vector
    group: vector
    mode: '0750'

- name: copy cert to collector
  become: true
  ansible.builtin.copy:
    src: "{{ collectors_root ~ '/' ~ ansible_host ~ '_cert.crt' }}"
    dest: "{{ vector_cert_path }}"
    owner: vector
    group: vector
    mode: '0640'

- name: copy key material to collector
  become: true
  ansible.builtin.copy:
    src: "{{ collectors_root ~ '/' ~ ansible_host ~ '_key.pem' }}"
    dest: "{{ vector_key_path }}"
    owner: vector
    group: vector
    mode: '0640'

## TODO - replace with enterprise CA root cert
- name: copy root CA to collector
  become: true
  ansible.builtin.copy:
    src: "{{ gateway_root ~ '/data_gateway.crt'}}"
    dest: "{{ vector_ca_path }}"
    owner: vector
    group: vector
    mode: '0640'

- name: render config template
  become: true
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: /etc/vector/vector.yaml
    owner: vector
    group: vector
    mode: '0640'

- name: start vector service
  become: true
  ansible.builtin.systemd_service:
    name: vector
    state: reloaded
    enabled: true

