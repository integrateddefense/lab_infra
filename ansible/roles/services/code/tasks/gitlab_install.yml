## Install and perform basic initial configurations for GitLab
- name: add gitlab install repo
  become: true
  ansible.builtin.yum_repository:
    name: gitlab_gitlab-ee
    description: "GitLab Enterprise Edition Repository"
    baseurl: https://packages.gitlab.com/gitlab/gitlab-ee/el/9/$basearch
    gpgcheck: yes
    repo_gpgcheck: yes
    gpgkey:
    - https://packages.gitlab.com/gitlab/gitlab-ee/gpgkey
    - https://packages.gitlab.com/gitlab/gitlab-ee/gpgkey/gitlab-gitlab-ee-3D645A26AB9FBD22.pub.gpg
    - https://packages.gitlab.com/gitlab/gitlab-ee/gpgkey/gitlab-gitlab-ee-CB947AD886C8E8FD.pub.gpg
    sslverify: true
    sslcacert: /etc/pki/tls/certs/ca-bundle.crt
    enabled: yes

- name: install gitlab ee
  become: true
  ansible.builtin.package:
    name: gitlab-ee
    state: present
