      template_storage_size: "{{ templates.win22.storage.size }}"
      vm_name: "{{ rodc.vm.name[iteration] }}"
      vm_id: "{{ rodc.vm.id[iteration] }}"
      vm_description: "{{ rodc.vm.description[iteration] }}"
      vm_storage: "{{ rodc.vm.storage }}"
      vm_storage_size: "{{ rodc.vm.size }}"
      vm_sockets: "{{ rodc.vm.sockets }}"
      vm_cores: "{{ rodc.vm.cores }}"
      vm_mem: "{{ rodc.vm.mem }}"
      vm_vid: "{{ rodc.vm.vid }}"
      ## To configure the service, see playbooks/domain.yml

