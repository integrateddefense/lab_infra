    vars:
      hypervisor_target: "{{ server }}"
      vm_name: "{{ storage.tnas.name[iteration] }}"
      vm_id: "{{ storage.tnas.id[iteration] }}"
      vm_description: "{{ storage.tnas.description[iteration] }}"
      vm_storage: "{{ storage.tnas.storage }}"
      vm_storage_size: "{{ storage.tnas.size }}"
      vm_storage_cache: "{{ storage.tnas.cache }}"
      vm_sockets: "{{ storage.tnas.sockets }}"
      vm_cores: "{{ storage.tnas.cores }}"
      vm_mem: "{{ storage.tnas.mem }}"
